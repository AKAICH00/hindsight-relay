---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lattice-relay-data
  namespace: openclaw-raziele-jaime
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lattice-relay
  namespace: openclaw-raziele-jaime
  labels:
    app: lattice-relay
    agent: jaime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lattice-relay
  template:
    metadata:
      labels:
        app: lattice-relay
        agent: jaime
    spec:
      containers:
        - name: lattice-relay
          image: 192.168.0.202:30501/lattice-relay:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7358
          env:
            - name: AGENT_ID
              value: "jaime"
            - name: PORT
              value: "7358"
            - name: QDRANT_URL
              value: "http://192.168.0.16:6334"
            - name: CONTACTS_INDEX
              value: "/data/contacts.json"
            - name: WATCH_STATE
              value: "/data/watched.json"
            - name: LOG_LEVEL
              value: "info"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lattice-relay-secrets
                  key: OPENAI_API_KEY
            - name: HINDSIGHT_AGENT_MAP
              valueFrom:
                secretKeyRef:
                  name: lattice-relay-secrets
                  key: HINDSIGHT_AGENT_MAP
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 7358
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 7358
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lattice-relay-data

---
apiVersion: v1
kind: Service
metadata:
  name: lattice-relay
  namespace: openclaw-raziele-jaime
spec:
  selector:
    app: lattice-relay
  ports:
    - port: 7358
      targetPort: 7358
  type: ClusterIP
